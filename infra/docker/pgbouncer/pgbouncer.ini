;; SoleMD.Graph serve PgBouncer config.
;; The auth contract is auth_query-based for engine_serve_read, with one local
;; auth_file entry reserved for the auth_user bootstrap credential.

[databases]
serve = host=graph-db-serve port=5432 dbname=serve auth_user=pgbouncer_auth

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = pgbouncer_auth
auth_query = SELECT usename, passwd FROM pgbouncer_auth.user_lookup($1)
admin_users = pgbouncer_auth
stats_users = pgbouncer_auth

pool_mode = transaction
ignore_startup_parameters = extra_float_digits, search_path

max_client_conn = 200
default_pool_size = 30
reserve_pool_size = 5
max_db_connections = 60
query_wait_timeout = 5
server_connect_timeout = 5
server_check_delay = 5
max_prepared_statements = 200

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
