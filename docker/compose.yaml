# SoleMD.Graph — Local Development Services
# Usage: docker compose -f docker/compose.yaml up -d
#
# Canonical services (per docs/map/rag-future.md):
#   graph-db         PostgreSQL 16 warehouse (canonical truth spine)
#   graph-opensearch Evidence-serving plane (paper_index, evidence_index)
#   graph-worker     Graph runtime + bundle/serving-package builder
#   graph-redis      Runtime cache

name: graph

services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    image: graph/db:pg18
    container_name: graph-db
    restart: unless-stopped
    profiles: ["db"]  # bring up explicitly (--profile db); not part of default up
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    shm_size: 8g
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: solemd_graph
      POSTGRES_USER: solemd
      POSTGRES_PASSWORD: solemd_local
    command: >
      postgres
      -c shared_buffers=8GB
      -c effective_cache_size=9GB
      -c maintenance_work_mem=2GB
      -c work_mem=256MB
      -c max_wal_size=8GB
      -c min_wal_size=1GB
      -c wal_compression=zstd
      -c wal_buffers=64MB
      -c checkpoint_timeout=30min
      -c checkpoint_completion_target=0.9
      -c wal_level=minimal
      -c max_wal_senders=0
      -c track_io_timing=on
      -c log_min_duration_statement=1000
      -c random_page_cost=1.1
    volumes:
      # Bind to warehouse VHDX per rag-future.md (PG canon on E-backed ext4).
      - ${GRAPH_POSTGRES_HOST_ROOT:-/mnt/solemd-graph/pg-data}:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solemd -d solemd_graph"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 12g
        reservations:
          memory: 2g

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: graph-opensearch
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - cluster.name=graph
      - node.name=graph-opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
      - plugins.security.disabled=true  # local dev only; prod uses managed
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ChangeThis_Local123!}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "127.0.0.1:9200:9200"  # localhost-only
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sfu admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ChangeThis_Local123!} http://localhost:9200/_cluster/health || curl -sf http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 6g
        reservations:
          memory: 4g

  redis:
    image: redis:8-alpine
    container_name: graph-redis
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    mem_limit: 512m
    ports:
      - "127.0.0.1:6380:6379"
    command: ["redis-server", "--requirepass", "local_dev"]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "local_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: docker/graph/Dockerfile
    image: graph/worker:cu13
    container_name: graph-worker
    profiles: ["gpu"]
    shm_size: 1g
    mem_limit: 20g
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - worker-venv:/workspaces/SoleMD.Graph/engine/.venv
      - ${GRAPH_STORAGE_HOST_ROOT:-/mnt/solemd-graph}:/mnt/solemd-graph
    environment:
      DATABASE_URL: postgresql://solemd:solemd_local@db:5432/solemd_graph
      REDIS_URL: redis://:local_dev@redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      LANGFUSE_BASE_URL: http://127.0.0.1:3100
      GRAPH_LAYOUT_BACKEND: gpu
      GRAPH_CLUSTER_BACKEND: gpu
      GRAPH_DIR: /mnt/solemd-graph
      SEMANTIC_SCHOLAR_DIR: /mnt/solemd-graph/data/semantic-scholar
      PUBTATOR_DIR: /mnt/solemd-graph/data/pubtator
      S2_RELEASE_ID: "2026-03-10"
      PUBTATOR_RELEASE_ID: "2026-03-21"
      S2_API_KEY: ${S2_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: http://127.0.0.1:3100
      LANGFUSE_TRACING_ENVIRONMENT: development
      UMLS_API_KEY: ${UMLS_API_KEY:-}
    # Soft deps only (no health-gated). db is optional (profile=db) and
    # worker should start without it. redis + opensearch are default-up.
    depends_on:
      - redis
      - opensearch
    networks:
      - default
      - shared-infra
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    command: sleep infinity

volumes:
  worker-venv:
  opensearch_data:

networks:
  default:
    name: graph-internal
  shared-infra:
    external: true

