# SoleMD.Graph — Local Development Services
# Usage: docker compose -f docker/compose.yaml up -d

name: solemd-graph

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: solemd-graph-db
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    shm_size: 8g
    ports:
      - "5433:5432"  # publish on the local Docker host; required for WSL/devcontainer clients
    environment:
      POSTGRES_DB: solemd_graph
      POSTGRES_USER: solemd
      POSTGRES_PASSWORD: solemd_local
    command: >
      postgres
      -c shared_buffers=8GB
      -c effective_cache_size=24GB
      -c maintenance_work_mem=2GB
      -c work_mem=256MB
      -c max_wal_size=8GB
      -c min_wal_size=1GB
      -c wal_compression=zstd
      -c wal_buffers=64MB
      -c checkpoint_timeout=30min
      -c checkpoint_completion_target=0.9
      -c wal_level=minimal
      -c max_wal_senders=0
      -c track_io_timing=on
      -c log_min_duration_statement=1000
      -c random_page_cost=1.1
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solemd -d solemd_graph"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: solemd-graph-redis
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    mem_limit: 512m
    ports:
      - "6380:6379"  # 6380 to avoid conflict with existing Redis
    command: ["redis-server", "--requirepass", "local_dev"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "local_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  graph:
    build:
      context: ..
      dockerfile: docker/graph/Dockerfile
    container_name: solemd-graph-graph
    profiles: ["gpu"]
    env_file:
      - ../.env.local
    shm_size: 1g
    mem_limit: 20g
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ..:/workspaces/SoleMD.Graph
      - graph-venv:/workspaces/SoleMD.Graph/engine/.venv
      - /mnt/e/SoleMD.Graph/data:/mnt/e/SoleMD.Graph/data:ro
      - /mnt/solemd-graph:/mnt/solemd-graph
    environment:
      # Docker-network-specific overrides (everything else from env_file)
      DATABASE_URL: postgresql://solemd:solemd_local@db:5432/solemd_graph
      REDIS_URL: redis://:local_dev@redis:6379/0
      LANGFUSE_BASE_URL: http://host.docker.internal:3100
      GRAPH_LAYOUT_BACKEND: gpu
      GRAPH_CLUSTER_BACKEND: gpu
      CUDA_PATH: /opt/conda/targets/x86_64-linux
      CUDA_HOME: /opt/conda/targets/x86_64-linux
      # Data paths: override .env.local defaults for container volume mounts
      SEMANTIC_SCHOLAR_DIR: /mnt/e/SoleMD.Graph/data/semantic-scholar
      PUBTATOR_DIR: /mnt/e/SoleMD.Graph/data/pubtator
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

volumes:
  pgdata:
  graph-venv:
