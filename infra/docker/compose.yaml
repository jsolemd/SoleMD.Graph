services:
  graph-db-serve:
    image: postgres:18.3-bookworm
    container_name: graph-db-serve
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GRAPH_DB_SERVE_POSTGRES_DB:-serve}
      POSTGRES_USER: ${GRAPH_DB_SERVE_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${GRAPH_DB_SERVE_POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${GRAPH_DB_SERVE_HOST_PORT:-55432}:5432"
    volumes:
      - graph_db_serve_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${GRAPH_DB_SERVE_POSTGRES_USER:-postgres} -d ${GRAPH_DB_SERVE_POSTGRES_DB:-serve}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  pgbouncer-serve:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer-serve
    restart: unless-stopped
    depends_on:
      graph-db-serve:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PGBOUNCER_SERVE_HOST_PORT:-56432}:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=${GRAPH_DB_SERVE_POSTGRES_PASSWORD:-postgres} psql -h 127.0.0.1 -p 6432 -U ${GRAPH_DB_SERVE_POSTGRES_USER:-postgres} ${GRAPH_DB_SERVE_POSTGRES_DB:-serve} -c 'SELECT 1;' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  graph-redis:
    image: redis:8.4.2-alpine3.22
    container_name: graph-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "no",
        "--save",
        "",
      ]
    ports:
      - "127.0.0.1:${GRAPH_REDIS_HOST_PORT:-56379}:6379"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  graph_db_serve_data:
