;; SoleMD.Graph Slice 1 bootstrap PgBouncer config.
;; This is the permanent config root for serve pooling. The auth surface is a
;; non-secret local example until the role/grant SQL lands under db/.

[databases]
serve = host=graph-db-serve port=5432 dbname=serve

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres
stats_users = postgres

pool_mode = transaction
ignore_startup_parameters = extra_float_digits

max_client_conn = 200
default_pool_size = 30
reserve_pool_size = 5
max_db_connections = 60
query_wait_timeout = 5
server_connect_timeout = 5
server_check_delay = 5
max_prepared_statements = 200

log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
pidfile = /tmp/pgbouncer.pid
